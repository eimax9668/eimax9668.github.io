            <p>高校生になりました。いや、マジで。</p>
            <h3>高校生活の目標</h3>
            <p>推薦を使って大学に行く。文系。<br>てか、国語が好きなら文系？それとも数学理科が嫌いなら文系なのでしょうか？</p>
            <h3>苦戦</h3>
            <p>友達を作ること。知らない人しかいない。インスタも繋げていないしクラスLINEにも入れていない。そして毎年４月に、「クラスLINEは誰が作るのか」という疑問を抱く。</p>
            <h3>まず頑張ること</h3>
            <p>知らない人との交流を増やす。部活に入る。</p>
