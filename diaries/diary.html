<!DOCTYPE html>
<html lang="ja">

<head prefix="og: https://ogp.me/ns#">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary - ei-max.net</title>
    <meta name="description" content="私は誰か、何をしているのか、そして思ったことを書く">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://ei-max.net/diaries/diary.html" />
    <meta property="og:title" content="ダークモード実装とか - ei-max.net" />
    <meta property="og:description" content="私は誰か、何をしているのか、そして思ったことを書く" />
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=IBM+Plex+Sans+JP:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        // 保存されているテーマを取得
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.dataset.theme = theme;
    </script>
</head>

<body>
    <div id="header"></div>
    <main>
        <h1><span class="marker">Diary</span></h1>
        <p>日記です。たぶん続きません。</p><br>
        
        <div id="article-list"></div>

        <script>
            fetch('articles.json')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('article-list');
                    data.forEach(article => {
                        const div = document.createElement('div');
                        div.className = 'article';
                        div.innerHTML = `
                            <a href="${article.filename}" class="article-link">${article.title}</a>
                            <br><span class="article-date">${article.dateText}</span>
                        `;
                        list.appendChild(div);
                    });
                })
                .catch(error => console.error('記事一覧の読み込みに失敗しました:', error));
        </script>

        <footer><small>©2026 ei-max.net</small><i class="bi bi-brightness-high" role="button" tabindex="0"
                aria-label="テーマ切り替えボタン" title="テーマ切り替えボタン"></i></footer>
    </main>
    <script src="/scripts/script.js" defer></script>
    <script src="/scripts/header.js" defer></script>
</body>

</html>
